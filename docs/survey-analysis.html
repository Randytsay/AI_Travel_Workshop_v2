  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg-primary: #0d1b2a; --bg-secondary: #1b2838; --bg-card: rgba(27,40,56,0.85);
      --bg-card-solid: #1b2838; --text-primary: #ffffff; --text-secondary: #a8c0d6;
      --text-muted: #6b8299; --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.18);
      --accent-coral: #ff6b6b; --accent-orange: #f39c12; --accent-yellow: #ffd93d;
      --accent-mint: #55efc4; --accent-sky: #74b9ff; --accent-pink: #fd79a8; --accent-purple: #a29bfe;
      --shadow-card: 0 8px 32px rgba(0,0,0,0.3);
    }
    [data-theme="light"] {
      --bg-primary: #fffdf8; --bg-secondary: #fff5e6; --bg-card: rgba(255,255,255,0.92);
      --bg-card-solid: #ffffff; --text-primary: #2d3436; --text-secondary: #4a5568;
      --text-muted: #7a8fa6; --border: rgba(0,0,0,0.08); --border-strong: rgba(0,0,0,0.16);
      --shadow-card: 0 8px 32px rgba(0,0,0,0.08);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; padding: 24px; }
    .container { max-width: 1200px; margin: 0 auto; }

    /* Header */
    .header { display:flex; align-items:center; gap:16px; margin-bottom:32px; padding-bottom:24px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    .header-badge { background: linear-gradient(135deg,#ff6b6b,#f39c12,#ffd93d); padding:6px 14px; border-radius:100px; font-size:0.75rem; font-weight:700; white-space:nowrap; }
    .header h1 { font-size:1.4rem; font-weight:700; }
    .header-sub { margin-left:auto; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
    .header .subtitle { color:var(--text-secondary); font-size:0.8rem; }
    .theme-btn {
      width:36px; height:36px; border-radius:50%; border:none; background:rgba(255,255,255,0.1);
      color:var(--text-secondary); font-size:1rem; cursor:pointer;
      display:flex; align-items:center; justify-content:center; transition:all 0.2s; flex-shrink:0;
    }
    .theme-btn:hover { background:rgba(255,255,255,0.2); transform:scale(1.1); }
    [data-theme="light"] .theme-btn { background:rgba(0,0,0,0.08); color:#2d3436; }

    /* KPI */
    .kpi-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(160px,1fr)); gap:16px; margin-bottom:36px; }
    .kpi-card {
      background:var(--bg-card); backdrop-filter:blur(20px); border:1px solid var(--border);
      border-radius:20px; padding:22px 16px; text-align:center; transition:all 0.3s;
    }
    .kpi-card:hover { box-shadow:var(--shadow-card); transform:translateY(-2px); }
    .kpi-icon { font-size:2rem; margin-bottom:8px; }
    .kpi-value {
      font-size:2.4rem; font-weight:900; line-height:1;
      background:linear-gradient(135deg,#ff6b6b,#f39c12,#ffd93d);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .kpi-label { color:var(--text-secondary); font-size:0.82rem; margin-top:6px; }
    .kpi-sub { color:var(--text-muted); font-size:0.72rem; margin-top:4px; }

    /* Section */
    .section { margin-bottom:48px; }
    .section-title { font-size:1.2rem; font-weight:700; margin-bottom:20px; display:flex; align-items:center; gap:10px; }
    .section-title::before { content:''; width:4px; height:24px; background:linear-gradient(135deg,#ff6b6b,#f39c12,#ffd93d); border-radius:2px; }

    /* Positive rate bars */
    .positive-bar { background:var(--bg-card); border:1px solid var(--border); border-radius:16px; padding:18px 20px; margin-bottom:12px; }
    .positive-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
    .positive-label { font-size:0.88rem; font-weight:600; }
    .positive-pct { font-size:1.1rem; font-weight:900; background:linear-gradient(135deg,#ff6b6b,#f39c12,#ffd93d); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .positive-track { height:10px; background:rgba(255,255,255,0.06); border-radius:6px; overflow:hidden; }
    [data-theme="light"] .positive-track { background:rgba(0,0,0,0.06); }
    .positive-fill { height:100%; border-radius:6px; background:linear-gradient(90deg,#ff6b6b,#f39c12,#ffd93d); transition:width 1.5s ease; }

    /* Charts grid */
    .chart-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(320px,1fr)); gap:20px; }
    .chart-card { background:var(--bg-card); backdrop-filter:blur(20px); border:1px solid var(--border); border-radius:20px; padding:22px; }
    .chart-title { font-size:0.88rem; font-weight:600; color:var(--text-secondary); margin-bottom:16px; display:flex; align-items:center; gap:8px; }
    .chart-wrap { position:relative; height:240px; }
    .chart-wrap.tall { height:300px; }

    /* Bar lists */
    .bar-list { display:flex; flex-direction:column; gap:10px; }
    .bar-item { display:flex; align-items:center; gap:10px; }
    .bar-label { font-size:0.82rem; min-width:90px; color:var(--text-secondary); text-align:right; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .bar-track { flex:1; height:22px; background:rgba(255,255,255,0.05); border-radius:11px; overflow:hidden; }
    [data-theme="light"] .bar-track { background:rgba(0,0,0,0.05); }
    .bar-fill { height:100%; border-radius:11px; display:flex; align-items:center; padding-left:10px; font-size:0.72rem; font-weight:700; color:white; transition:width 1s ease; white-space:nowrap; }
    .bar-value { font-size:0.82rem; font-weight:700; color:var(--text-primary); min-width:24px; text-align:right; }

    /* Tables */
    .table-wrap { background:var(--bg-card); backdrop-filter:blur(20px); border:1px solid var(--border); border-radius:20px; overflow:hidden; overflow-x:auto; }
    table { width:100%; border-collapse:collapse; min-width:900px; }
    th { background:rgba(255,255,255,0.04); padding:13px 14px; text-align:left; font-size:0.78rem; font-weight:700; color:var(--text-secondary); white-space:nowrap; border-bottom:1px solid var(--border); }
    [data-theme="light"] th { background:rgba(0,0,0,0.03); }
    td { padding:11px 14px; font-size:0.82rem; border-bottom:1px solid rgba(255,255,255,0.03); color:var(--text-primary); vertical-align:top; }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:rgba(255,255,255,0.03); }
    [data-theme="light"] tr:hover td { background:rgba(0,0,0,0.02); }
    .badge { display:inline-block; padding:3px 9px; border-radius:100px; font-size:0.72rem; font-weight:600; }
    .badge-green { background:rgba(85,239,196,0.15); color:#55efc4; }
    .badge-yellow { background:rgba(255,217,61,0.15); color:#ffd93d; }
    .badge-orange { background:rgba(243,156,18,0.15); color:#f39c12; }
    .badge-sky { background:rgba(116,185,255,0.15); color:#74b9ff; }
    .badge-newfriend { background:rgba(253,121,168,0.18); color:#fd79a8; border:1px solid rgba(253,121,168,0.3); }
    .badge-partner { background:rgba(85,239,196,0.12); color:#55efc4; border:1px solid rgba(85,239,196,0.25); }
    .name-cell { font-weight:700; }
    .ref-cell { color:var(--text-muted); font-size:0.78rem; }
    .tag-small { display:inline-block; margin:2px; padding:2px 7px; border-radius:6px; background:rgba(255,107,107,0.1); border:1px solid rgba(255,107,107,0.2); font-size:0.7rem; color:#ff6b6b; }
    .no-comment { color:var(--text-muted); font-style:italic; }

    /* Two-column table layout */
    .table-split { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
    @media(max-width:900px) { .table-split { grid-template-columns:1fr; } }

    /* Referral cards */
    .ref-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(150px,1fr)); gap:12px; }
    .ref-card { background:var(--bg-card); backdrop-filter:blur(20px); border:1px solid var(--border); border-radius:16px; padding:16px; text-align:center; transition:all 0.3s; }
    .ref-card:hover { box-shadow:var(--shadow-card); }
    .ref-avatar { width:48px; height:48px; border-radius:50%; background:linear-gradient(135deg,#ff6b6b,#f39c12,#ffd93d); display:flex; align-items:center; justify-content:center; font-size:1.3rem; margin:0 auto 8px; }
    .ref-name { font-weight:700; font-size:0.88rem; }
    .ref-count { font-size:0.78rem; color:var(--text-secondary); margin-top:4px; }
    .ref-count span { font-size:1.5rem; font-weight:900; background:linear-gradient(135deg,#ff6b6b,#f39c12,#ffd93d); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .ref-tag { display:inline-block; margin-top:6px; padding:2px 8px; border-radius:6px; background:rgba(85,239,196,0.1); border:1px solid rgba(85,239,196,0.2); font-size:0.7rem; color:#55efc4; }

    /* Highlights */
    .highlight-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(260px,1fr)); gap:16px; }
    .highlight-card { background:var(--bg-card); border:1px solid var(--border); border-radius:16px; padding:18px; }
    .highlight-title { font-size:0.75rem; font-weight:700; color:var(--text-muted); margin-bottom:10px; text-transform:uppercase; letter-spacing:0.05em; }
    .highlight-text { font-size:0.88rem; line-height:1.7; color:var(--text-secondary); }
    .highlight-text::before { content:'「'; color:var(--accent-coral); font-size:1.1rem; }
    .highlight-text::after { content:'」'; color:var(--accent-coral); font-size:1.1rem; }

    /* Filter tabs */
    .filter-tabs { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
    .filter-tab { padding:7px 16px; border-radius:100px; border:1px solid var(--border); background:transparent; color:var(--text-secondary); font-size:0.82rem; font-weight:600; cursor:pointer; transition:all 0.2s; font-family:inherit; }
    .filter-tab:hover { border-color:var(--border-strong); color:var(--text-primary); }
    .filter-tab.active { background:linear-gradient(135deg,#ff6b6b,#f39c12,#ffd93d); color:#fff; border-color:transparent; }

    /* Update info */
    .update-info { color:var(--text-muted); font-size:0.75rem; text-align:center; margin-top:12px; }

    @media(max-width:600px) {
      .chart-grid { grid-template-columns:1fr; }
      .kpi-grid { grid-template-columns:repeat(2,1fr); }
    }
  </style>
</head>

    </div>
  </div>

  <!-- New friends vs Partners comparison -->
  <div class="section">
    <div class="section-title">🌸 新朋友 vs 🤝 夥伴｜分群對比</div>
    <div class="chart-grid">
      <div class="chart-card"><div class="chart-title">🌟 產品感受｜新朋友 vs 夥伴</div><div class="chart-wrap tall"><canvas id="c-split-q1"></canvas></div></div>
      <div class="chart-card"><div class="chart-title">🔄 再參加意願｜新朋友 vs 夥伴</div><div class="chart-wrap tall"><canvas id="c-split-q7b"></canvas></div></div>

    </div>
  </div>

  <!-- Referral network -->

    <div class="section-title">👥 引路人網絡</div>
    <div class="ref-grid" id="ref-grid"></div>
  </div>

  <!-- Comments -->

    <div class="section-title">💬 精彩回饋摘錄</div>
    <div class="highlight-grid" id="highlight-grid"></div>
  </div>

  <div class="update-info" id="update-info"></div>
</div>

//  Helpers
// ══════════════════════════════════════════════════════════════
const ACCENT = ['#ff6b6b','#f39c12','#ffd93d','#55efc4','#74b9ff','#fd79a8','#a29bfe','#00cec9','#e17055','#fab1a0'];
const P_COLORS = {'火山泥面膜':'#ff6b6b','NAD青春霜':'#f39c12','保濕露':'#ffd93d','潔膚乳':'#55efc4','小黑卸妝棉':'#74b9ff','其他：防曬':'#fd79a8','其他：化妝水':'#a29bfe'};
const C_COLORS = {'進階肌膚保養':'#ff6b6b','AI工具應用':'#f39c12','彩妝技巧':'#ffd93d','健康養生講座':'#55efc4','其他':'#74b9ff'};

function isNew(r) { return (r['新朋友']||'').trim() === 'v'; }
function isPartner(r) { return !isNew(r); }

function cntField(rows, key) {
  const c = {}; rows.forEach(r => { const v=(r[key]||'').trim(); if(v) c[v]=(c[v]||0)+1; });
  return Object.entries(c).sort((a,b)=>b[1]-a[1]);
}
function cntMulti(rows, key) {
  const c = {}; rows.forEach(r => (r[key]||'').split('、').forEach(s=>{ const v=s.trim(); if(v) c[v]=(c[v]||0)+1; }));
  return Object.entries(c).sort((a,b)=>b[1]-a[1]);
}
function posRate(rows, key, kw) {
  const t=rows.length, p=rows.filter(r=>(r[key]||'').includes(kw)).length;
  return {p, t, pct: Math.round(p/t*100)};
}
function badge(val, posKws, negKws) {
  if (posKws.some(k=>(val||'').includes(k))) return 'badge-green';
  if (negKws.some(k=>(val||'').includes(k))) return 'badge-orange';
  return 'badge-yellow';
}
function tagsHtml(str) {
  if(!(str||'').trim()) return '<span class="no-comment">—</span>';
  return (str||'').split('、').map(s=>`<span class="tag-small">${s.trim()}</span>`).join('');
}

// Chart.js defaults
function applyChartDefaults() {
  const tc = getComputedStyle(document.documentElement).getPropertyValue('--text-secondary').trim() || '#a8c0d6';
  Chart.defaults.color = tc;
  Chart.defaults.plugins.legend.labels.usePointStyle = true;
  Chart.defaults.plugins.legend.labels.padding = 14;
  Chart.defaults.plugins.legend.labels.font = { size: 12 };
}
function donut(id, data, colors) {
  const ctx = document.getElementById(id).getContext('2d');
  new Chart(ctx, {
    type: 'doughnut',
    data: { labels: data.map(d=>d[0]), datasets:[{ data: data.map(d=>d[1]), backgroundColor: colors.slice(0,data.length), borderWidth:0, hoverOffset:8 }] },
    options: { responsive:true, maintainAspectRatio:false, cutout:'62%', plugins:{ legend:{ position:'bottom' }, tooltip:{ callbacks:{ label:ctx=>` ${ctx.label}: ${ctx.parsed}人 (${Math.round(ctx.parsed/ctx.dataset.data.reduce((a,b)=>a+b,0)*100)}%)` } } } }
  });
}
function barList(id, data, colorMap, maxVal) {
  const el = document.getElementById(id);
  const max = maxVal || Math.max(...data.map(d=>d[1]),1);
  el.innerHTML = data.slice(0,7).map(([label,count]) => {
    const pct = Math.round(count/max*100);
    const color = colorMap?.[label] || ACCENT[data.indexOf(data.find(d=>d[0]===label))] || ACCENT[0];
    return `<div class="bar-item"><div class="bar-label" title="${label}">${label}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}">${count}</div></div><div class="bar-value">${count}</div></div>`;
  }).join('');
}

function splitGroupedBar(id, key, options, nf, pt) {
  const ctx = document.getElementById(id).getContext('2d');
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: options,
      datasets: [
        { label: `🌸 新朋友 (${nf.length}人)`, data: options.map(o=>nf.filter(r=>(r[key]||'').includes(o)).length), backgroundColor:'#fd79a8', borderRadius:8, borderSkipped:false },
        { label: `🤝 夥伴 (${pt.length}人)`, data: options.map(o=>pt.filter(r=>(r[key]||'').includes(o)).length), backgroundColor:'#55efc4', borderRadius:8, borderSkipped:false }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: { x:{grid:{display:false}}, y:{beginAtZero:true,ticks:{stepSize:1}} },
      plugins: { legend:{ position:'bottom' } }
    }
  });
}

function renderReferrals() {
  const refC = {}, refNames = {};
  SURVEY_DATA.forEach(r => {
    const ref=(r['帶您來的朋友']||'').trim(), name=(r['姓名']||'').trim();
    if(ref && ref!==name) {
      refC[ref] = (refC[ref]||0)+1;
      if(!refNames[ref]) refNames[ref]=[];
      refNames[ref].push(name);
    }
  });
  const sorted = Object.entries(refC).sort((a,b)=>b[1]-a[1]);
  const emojis = ['🌟','🔥','💫','⭐','🌈','✨','🎯','👑','🌸','🎉'];
  document.getElementById('ref-grid').innerHTML = sorted.length ? sorted.map(([ref,count],i)=>
    `<div class="ref-card">
      <div class="ref-avatar">${emojis[i%emojis.length]}</div>
      <div class="ref-name">${ref}</div>
      <div class="ref-count"><span>${count}</span> 位</div>
      ${(refNames[ref]||[]).filter(n=>n!==ref).length ? `<div class="ref-tag">帶來：${refNames[ref].join('、')}</div>` : ''}
    </div>`
  ).join('') : '<p style="color:var(--text-muted)">尚無引路人資料</p>';
}

    const q3b = badge(r['Q3教學方式'],['非常清楚'],['還不錯']);
    const q4b = badge(r['Q4實作體驗'],['非常有感'],['有幫助']);
    const q7bb = badge(r['Q7b再次參加'],['願意'],['視主題','暫不考慮','好奇']);
    const q8b = badge(r['Q8事業機會'],['很有興趣'],['好奇'],['暫不考慮']);
    return `<tr>
      <td class="name-cell">${r['姓名']||'—'}</td>
      <td><span class="badge ${typeBadge}">${personType}</span></td>
      <td class="ref-cell">${r['帶您來的朋友']||'—'}</td>
      <td><span class="badge ${q1b}">${r['Q1產品感受']||'—'}</span></td>
      <td><span class="badge ${q2b}">${r['Q2課程理解']||'—'}</span></td>
      <td><span class="badge ${q3b}">${r['Q3教學方式']||'—'}</span></td>
      <td><span class="badge ${q4b}">${r['Q4實作體驗']||'—'}</span></td>
      <td>${tagsHtml(r['Q5感興趣產品'])}</td>
      <td>${tagsHtml(r['Q6想改善問題'])}</td>
      <td>${tagsHtml(r['Q7感興趣課程'])}</td>
      <td><span class="badge ${q7bb}">${r['Q7b再次參加']||'—'}</span></td>
      <td><span class="badge ${q8b}">${r['Q8事業機會']||'—'}</span></td>
    </tr>`;
  }).join('');
}

// ══════════════════════════════════════════════════════════════
//  Highlights
// ══════════════════════════════════════════════════════════════
function renderHighlights() {
  const withComments = SURVEY_DATA.filter(r=>(r['Q9印象深刻']||'').trim() || (r['Q10留言']||'').trim());
  document.getElementById('highlight-grid').innerHTML = withComments.map(r=>{
    const text = (r['Q9印象深刻']||'').trim() || (r['Q10留言']||'').trim();
    const isNF = isNew(r);
    return `<div class="highlight-card">
      <div class="highlight-title">${isNF?'🌸':'🤝'} ${r['姓名']} 的回饋${(r['Q9印象深刻']||'').trim() ? '｜印象最深' : ''}</div>
      <div class="highlight-text">${text}</div>
    </div>`;
  }).join('') || '<p style="color:var(--text-muted)">尚無留言</p>';
}

// ══════════════════════════════════════════════════════════════
//  Theme
// ══════════════════════════════════════════════════════════════
function toggleTheme() {
  const next = document.documentElement.getAttribute('data-theme')==='dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  document.getElementById('themeBtn').textContent = next==='dark'?'🌙':'☀️';
  location.reload();
}
const savedTheme = localStorage.getItem('theme') || 'dark';
document.documentElement.setAttribute('data-theme', savedTheme);
document.getElementById('themeBtn') && (document.getElementById('themeBtn').textContent = savedTheme==='dark'?'🌙':'☀️');

// Filter tabs
document.querySelectorAll('.filter-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    renderTable(tab.dataset.filter);
  });
});
